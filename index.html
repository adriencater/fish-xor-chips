<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Fish and Chips (Cater)</title>
	<link rel="stylesheet" href="style.css">

	<style>
		body{
			max-width: 50rem;
			margin: auto;;
		}
		.color{
			width: max-content;
			margin:2rem;
		}
		.swatch{
			width: 2.54cm;
			aspect-ratio: 1;
		}
		.label{
			font-family: monospace;
			border-top: 1px solid #CCC;
			padding-top: 0.5em;
			margin-top: 0.5em;
		}
	</style>

</head>
<body>
	<img src="logo.svg" alt="Logo Fishli und Chips">

	<section id="CharteGraphique">

		<article id="Couleur">
			<h1>Couleur</h1>

			<div class="color">
				<h3>«Fiesta»</h3>
				<div class="swatch" style="background: #F1357A;"></div>
				<p class="label">#F1357A</p>
				<p class="label">rgb 123, 234, 012</p>
				<p class="label">cmjn 100%, 50%, 90%, 0%</p>
			</div>

			<div class="color">
				<h3>«Blue»</h3>
				<div class="swatch" style="background: #357AF1;"></div>
				<p class="label">#357AF1</p>
				<p class="label">rgb 123, 234, 012</p>
				<p class="label">cmjn 100%, 50%, 90%, 0%</p>
			</div>

		</article>
		<!-- #Couleur -->

	</section>
	<!-- #CharteGraphique -->

</body>
</html>
