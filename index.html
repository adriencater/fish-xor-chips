<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Fish and Chips (Cater)</title>
	<link rel="stylesheet" href="style.css">

	<style>
		body{
			max-width: 50rem;
			margin: auto;;
		}
		.color{
			width: max-content;
			margin:2rem;
		}
		.swatch{
			width: 2.54cm;
			aspect-ratio: 1;
		}
		.label{
			font-family: monospace;
			border-top: 1px solid #CCC;
			padding-top: 0.5em;
			margin-top: 0.5em;
		}
	</style>

</head>
<body>

	
	<section id="Identite">

		<article id="Logo">
			<h2>Logo</h2>
			<img src="logo.svg" alt="Logo Fish && Chips">
		</article>

		<article id="Application">
			<h2>Application</h2>
			<img src="truck.jpg" alt="Image du camion decoré">
		</article>

		<article id="web">
			<h2>Maquette de site web</h2>

			<div class="row">
				<div>
					<h3>Page d’acceuil</h3>
					<img src="page-web-01.png" alt="maquette web mobile">
				</div>
				<div>
					<h3>Menu</h3>
					<img src="page-web-01.png" alt="maquette web mobile">
				</div>
				<div>
					<h3>Horaire & localisation</h3>
					<img src="page-web-01.png" alt="maquette web mobile">
				</div>
			</div><!-- fin .row -->

		</article>

	</section>


	<section id="CharteGraphique">

		<article id="Couleur">
			<h2>Couleur</h2>

			<script src="swatches.js"></script>


			<div class="color">
				<h3>Couleur Principale: «Rose»</h3>
				<div class="swatch" style="background: var(--couleurPrincipale);"></div>
				<p class="label" data-color-format="hex"></p>
				<p class="label" data-color-format="rgb"></p>
				<p class="label" data-color-format="hsl"></p>
				<p class="label" data-color-format="lab"></p>
				<p class="label" data-color-format="cmyk"></p>
			</div>

			<div class="color">
				<h3>Couleur Secondaire: «Azur»</h3>
				<div class="swatch" style="background: var(--couleurSecondaire);"></div>
				<p class="label" data-color-format="hex"></p>
				<p class="label" data-color-format="rgb"></p>
				<p class="label" data-color-format="hsl"></p>
				<p class="label" data-color-format="lab"></p>
				<p class="label" data-color-format="cmyk"></p>
			</div>

			<div class="color">
				<h3>Mix</h3>
				<div class="swatch" style="background: var(--couleurMix)"></div>
				<p class="label" data-color-format="hex"></p>
				<p class="label" data-color-format="rgb"></p>
			</div>

			<div class="color">
				<h3>Fiesta Obscur</h3>
				<div class="swatch" style="background-color: hsl( from var(--couleurPrincipale) h s 25% );"></div>
				<p class="label" data-color-format="hex"></p>
				<p class="label" data-color-format="rgb"></p>
			</div>

		</article>
		<!-- #Couleur -->

	</section>
	<!-- #CharteGraphique -->

</body>
</html>
